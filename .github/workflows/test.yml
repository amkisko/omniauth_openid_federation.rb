name: test

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Audit root Gemfile.lock
        run: bundle exec bundle audit check --update
      - name: Install and audit appraisal gemfiles (Ruby 3.4)
        run: |
          for gemfile in gemfiles/{ruby,truffleruby,rails6,rails72,rails8}.gemfile; do
            echo "==> $gemfile"
            BUNDLE_GEMFILE="$gemfile" bundle install
            BUNDLE_GEMFILE="$gemfile" bundle exec bundle audit check
          done
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: false
      - name: Install and audit rails8_ruby4
        run: |
          BUNDLE_GEMFILE=gemfiles/rails8_ruby4.gemfile bundle install
          BUNDLE_GEMFILE=gemfiles/rails8_ruby4.gemfile bundle exec bundle audit check

  test:
    needs: audit
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - gemfile: rails6
            ruby_version: "3.3"
          - gemfile: rails72
            ruby_version: "3.4"
          - gemfile: rails8
            ruby_version: "3.4"
          - gemfile: rails8_ruby4
            ruby_version: "4.0"

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile

    steps:
    - uses: actions/checkout@v7

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby_version }}
        bundler-cache: true

    - name: Run tests (parallel OS processes via polyrun)
      run: |
        bundle exec polyrun build-paths -c polyrun.yml
        bundle exec polyrun parallel-rspec --workers 5 -c polyrun.yml

  integration:
    needs: audit
    runs-on: ubuntu-latest
    env:
      CLEANUP_ON_EXIT: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run mock OP/RP integration flow
        run: bundle exec ruby examples/integration_test_flow.rb
      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-logs
          path: tmp/integration_test/
          if-no-files-found: ignore

  # One job: 5 RSpec processes on one runner + merged coverage + per-shard JSON for JUnit
  coverage-shard:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails8.gemfile
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run parallel RSpec with Polyrun coverage
        run: |
          bundle exec polyrun build-paths -c polyrun.yml
          bundle exec polyrun parallel-rspec --workers 5 -c polyrun.yml -- bundle exec rspec --format documentation
      - uses: actions/upload-artifact@v7
        with:
          name: polyrun-coverage-parallel
          path: |
            coverage/merged.json
            coverage/polyrun-fragment-*.json
            tmp/rspec-*.json

  coverage-merge:
    needs: coverage-shard
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails8.gemfile
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - uses: actions/download-artifact@v8
        with:
          name: polyrun-coverage-parallel
          path: _artifacts
      - name: Merge coverage + JUnit
        run: |
          set -euo pipefail
          test -f _artifacts/coverage/merged.json
          mkdir -p coverage
          cp _artifacts/coverage/merged.json coverage/polyrun-merged.json
          bundle exec polyrun report-coverage -i coverage/polyrun-merged.json -o coverage --basename coverage --format cobertura,json
          bundle exec polyrun report-junit -i "_artifacts/tmp/rspec-*.json" -o coverage/junit-coverage.xml
      - uses: SonarSource/sonarqube-scan-action@v8
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - uses: codecov/codecov-action@v7
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - uses: codecov/codecov-action@v7
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          report_type: test_results
          files: coverage/junit-coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
